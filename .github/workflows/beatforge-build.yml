name: BEATFORGE — Build Windows & Mac

on:
  workflow_dispatch:          # запускается вручную одной кнопкой

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: beatforge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: beatforge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Package Electron (Windows portable .exe)
        run: npx electron-builder --win portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BEATFORGE-Windows
          path: beatforge/dist-electron/*.exe
          retention-days: 30

  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: beatforge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: beatforge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Package Electron (macOS .dmg)
        run: npx electron-builder --mac dmg --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BEATFORGE-macOS
          path: beatforge/dist-electron/*.dmg
          retention-days: 30
